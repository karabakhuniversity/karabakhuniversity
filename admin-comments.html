<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comments — Admin Panel</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="admin-wrap">

  <aside class="admin-sidebar" id="adminSidebar" aria-label="Admin navigation">
    <div class="sidebar__brand">
      <span class="sidebar__brand-name">Karabakh University</span>
      <span class="sidebar__brand-sub">Admin Panel</span>
    </div>

    <nav class="sidebar__nav">
      <span class="sidebar__label">Overview</span>
      <a href="admin-dashboard.html" class="sidebar__link"><span class="sidebar__link__icon">📊</span> Dashboard</a>
      <a href="admin-dashboard.html" class="sidebar__link"><span class="sidebar__link__icon">📋</span> All Content</a>

      <span class="sidebar__label">By Type</span>
      <a href="admin-dashboard.html?type=book" class="sidebar__link"><span class="sidebar__link__icon">📖</span> Books</a>
      <a href="admin-dashboard.html?type=article" class="sidebar__link"><span class="sidebar__link__icon">📰</span> Magazines &amp; Articles</a>
      <a href="admin-dashboard.html?type=essay" class="sidebar__link"><span class="sidebar__link__icon">✍️</span> Essays</a>
      <a href="admin-dashboard.html?type=story" class="sidebar__link"><span class="sidebar__link__icon">📓</span> Stories</a>
      <a href="admin-dashboard.html?type=student-spotlight" class="sidebar__link"><span class="sidebar__link__icon">⭐</span> Student Spotlight</a>

      <span class="sidebar__label">Community</span>
      <a href="admin-comments.html" class="sidebar__link active"><span class="sidebar__link__icon">💬</span> Comments</a>

      <span class="sidebar__label">Actions</span>
      <a href="admin-form.html" class="sidebar__link"><span class="sidebar__link__icon">➕</span> Add New Content</a>
      <a href="index.html" class="sidebar__link" target="_blank"><span class="sidebar__link__icon">🌐</span> View Site</a>
    </nav>

    <div class="sidebar__footer">
      <button class="sidebar__logout" id="logoutBtn"><span style="font-size:1rem">🔓</span> Sign Out</button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="btn btn--outline btn--sm btn--icon" id="sidebarToggle" aria-label="Toggle sidebar" style="display:none">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <h1 class="admin-topbar__title">Comments</h1>
      </div>
    </header>

    <div class="admin-content">

      <div class="stats-row" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-card__n" id="pendingBadge">—</div>
          <div class="stat-card__l">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__n" id="approvedBadge">—</div>
          <div class="stat-card__l">Approved</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__n" id="allBadge">—</div>
          <div class="stat-card__l">All</div>
        </div>
      </div>

      <div class="content-table-wrap">
        <div class="table-toolbar">
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn--outline btn--sm" data-filter="pending">Pending</button>
            <button class="btn btn--outline btn--sm" data-filter="approved">Approved</button>
            <button class="btn btn--outline btn--sm" data-filter="all">All</button>
          </div>
        </div>

        <div style="overflow-x:auto">
          <table aria-label="Comments table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Comment</th>
                <th>Content</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="commentsTableBody">
              <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--c-text-muted)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
<script>
  const st = document.getElementById('sidebarToggle');
  if (st && window.innerWidth <= 1080) st.style.display = 'flex';
  window.addEventListener('resize', () => {
    if (st) st.style.display = window.innerWidth <= 1080 ? 'flex' : 'none';
  });
</script>
</body>
</html>
