<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Admin Panel</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="admin-wrap">

  <aside class="admin-sidebar" id="adminSidebar" aria-label="Admin navigation">
    <div class="sidebar__brand">
      <span class="sidebar__brand-name">Karabakh University</span>
      <span class="sidebar__brand-sub">Admin Panel</span>
    </div>

    <nav class="sidebar__nav">
      <span class="sidebar__label">Overview</span>
      <a href="admin-dashboard.html" class="sidebar__link">
        <span class="sidebar__link__icon">📊</span> Dashboard
      </a>
      <a href="admin-dashboard.html" class="sidebar__link">
        <span class="sidebar__link__icon">📋</span> All Content
      </a>

      <span class="sidebar__label">By Type</span>
      <a href="admin-dashboard.html?type=book" class="sidebar__link"><span class="sidebar__link__icon">📖</span> Books</a>
      <a href="admin-dashboard.html?type=article" class="sidebar__link"><span class="sidebar__link__icon">📰</span> Articles</a>
      <a href="admin-dashboard.html?type=essay" class="sidebar__link"><span class="sidebar__link__icon">✍️</span> Essays</a>
      <a href="admin-dashboard.html?type=magazine" class="sidebar__link"><span class="sidebar__link__icon">📑</span> Magazines</a>
      <a href="admin-dashboard.html?type=story" class="sidebar__link"><span class="sidebar__link__icon">📓</span> Stories</a>
      <a href="admin-dashboard.html?type=art-photo" class="sidebar__link"><span class="sidebar__link__icon">🖼️</span> Art &amp; Photo</a>

      <span class="sidebar__label">Actions</span>
      <a href="admin-form.html" class="sidebar__link">
        <span class="sidebar__link__icon">➕</span> Add New Content
      </a>
      <a href="index.html" class="sidebar__link" target="_blank">
        <span class="sidebar__link__icon">🌐</span> View Site
      </a>
    </nav>

    <div class="sidebar__footer">
      <button class="sidebar__logout" id="logoutBtn">
        <span style="font-size:1rem">🔓</span> Sign Out
      </button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="btn btn--outline btn--sm btn--icon" id="sidebarToggle" aria-label="Toggle sidebar" style="display:none">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <h1 class="admin-topbar__title">Content Dashboard</h1>
      </div>

      <div class="admin-topbar__actions">
        <a href="admin-form.html" class="btn btn--primary btn--sm">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Add Content
        </a>
      </div>
    </header>

    <div class="admin-content">
      <div class="stats-row" id="statsRow">
        <!-- Populated by admin.js -->
      </div>

      <div class="content-table-wrap">
        <div class="table-toolbar">
          <div class="table-toolbar__search">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M9.5 9.5l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <input type="search" id="tableSearch" placeholder="Search content…" aria-label="Search table"/>
          </div>

          <div class="table-toolbar__filter">
            <select id="tableFilter" aria-label="Filter by type">
              <option value="all">All Types</option>
            </select>
          </div>

          <a href="admin-form.html" class="btn btn--outline btn--sm">+ Add New</a>
        </div>

        <div style="overflow-x:auto">
          <table aria-label="Content table">
            <thead>
              <tr>
                <th class="td-cover-wrap">Cover</th>
                <th>Title</th>
                <th>Type</th>
                <th class="td-author-col">Author</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="contentTableBody">
              <!-- Populated by admin.js -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
<script>
  const st = document.getElementById('sidebarToggle');
  if (st && window.innerWidth <= 1080) st.style.display = 'flex';

  window.addEventListener('resize', () => {
    if (st) st.style.display = window.innerWidth <= 1080 ? 'flex' : 'none';
  });
</script>
</body>
</html>
